name: CI

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  build:
    name: Run tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x
      - name: Build
        run: |
          npm ci
          npm run build
      - name: Test
        run: |
          npm test
      - name: Test Dist
        run: |
          rm -rf node_modules
          npm ci --omit=dev
          npm run test:dist
